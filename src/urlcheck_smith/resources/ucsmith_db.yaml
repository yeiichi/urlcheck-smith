version: 1.7
metadata:
  description: 'UcSmith: Multi-Tiered Credibility Database'
  definitions:
    TIER_1_OFFICIAL: >
      Highest trust level. Entities established by law, treaty, or state mandate.
      Includes sovereign governments, central banks, and intergovernmental 
      organizations (IGOs). These sources are considered primary records.
    TIER_2_RELIABLE: >
      High credibility. Entities with rigorous editorial oversight, academic
      peer-review, or industry-wide technical consensus. Includes major news 
      wires, accredited universities, and global standards bodies (e.g., 3GPP).
    TIER_3_GENERAL: >
      Baseline trust. General-purpose domains, open-registration TLDs, and 
      independent NGOs. While often reputable, these lack the formal mandate 
      of Tier 1 or the strict gatekeeping of Tier 2.
  priority:
  - user_defined
  - api_audit
  - global_rules
user_defined:
- name: un.org
  category: international
  trust_tier: TIER_1_OFFICIAL
audit_log: []
