rules:
  - suffix: ".go.jp"
    category: government
    trust_tier: TIER_1_OFFICIAL
  - suffix: ".lg.jp"
    category: local_gov
    trust_tier: TIER_1_OFFICIAL
  - suffix: ".ac.jp"
    category: education
    trust_tier: TIER_2_RELIABLE
  - suffix: ".or.jp"
    category: organization
    trust_tier: TIER_3_GENERAL
  - domain: "nikkei.com"
    category: news
    trust_tier: TIER_2_RELIABLE
  - domain: "asahi.com"
    category: news
    trust_tier: TIER_2_RELIABLE
  - domain: "yomiuri.co.jp"
    category: news
    trust_tier: TIER_2_RELIABLE

default_category: private
default_trust_tier: TIER_3_GENERAL
